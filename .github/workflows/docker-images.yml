name: Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: migrator
            image_suffix: migrator
            service_cmd: ./cmd/migrator

          - service: tgcollector
            image_suffix: tgcollector
            service_cmd: ./services/tgcollector/cmd/tgcollector

          - service: tgclassifier
            image_suffix: tgclassifier
            service_cmd: ./services/tgclassifier/cmd/tgclassifier

          - service: tgnotifier
            image_suffix: tgnotifier
            service_cmd: ./services/tgnotifier/cmd/tgnotifier

          - service: tgsearchbot
            image_suffix: tgsearchbot
            service_cmd: ./services/tgsearchbot/cmd/tgsearchbot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_suffix }}
          tags: |
            type=sha,format=short
            type=raw,value=main,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image_suffix }}
            org.opencontainers.image.description=telegram-bot-scraper ${{ matrix.image_suffix }} service
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/go-service.Dockerfile
          push: true
          build-args: |
            SERVICE_CMD=${{ matrix.service_cmd }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}