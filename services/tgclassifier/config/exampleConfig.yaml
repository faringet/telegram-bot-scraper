app_name: tg-classifier
env: dev

logger:
  level: info
  json: true

runtime:
  shutdown_timeout: 15s

storage:
  driver: postgres
  postgres:
    dsn: ""
    max_open_conns: 10
    max_idle_conns: 5
    conn_max_lifetime: 30m
    conn_max_idle_time: 5m

ollama:
  base_url: http://127.0.0.1:11434
  timeout: 60s
  model: qwen2.5:7b
  keep_alive: 2h

classifier:
  # Режим работы classifier: interval — старый периодический цикл, schedule — запуск по расписанию
  mode: schedule

  # Как часто worker просыпается и пытается забрать новую пачку работы.
  interval: 1m

  # Максимальное число hit'ов, которые worker забирает за один claim
  batch_size: 20

  # Если worker упал, после истечения lease запись сможет забрать другой worker
  lease: 2m

  # Явный идентификатор worker'а
  worker_id: ""

  # До какой длины обрезаем текст перед отправкой в LLM
  max_text_runes: 1800

  # (LLM, parse, DB update)
  max_retries: 3

  # Бэкоф, очевидно
  retry_backoff: 750ms

  # Если true то берем только не доставленные записи
  only_undelivered: false

  # Путь к внешнему whitelist-файлу компаний (.txt)
  whitelist_path: ""

  # Путь к внешнему prompt template
  prompt_path: ""

  schedule:
    timezone: "Europe/Moscow" # Часовой пояс, в котором интерпретируются run_times
    run_times:
      - "04:00" # Основной ночной прогон: разбирает пачку новостей, накопившуюся за ночь
      - "10:00" # Второй прогон: добирает хвосты и утренние новости перед рассылкой
    max_run_duration: 3h # Максимальная длительность одного scheduled run; после этого окно принудительно завершается
    warmup_before_run: true # Перед началом окна сделать прогрев модели, чтобы первый боевой запрос не упирался в cold start