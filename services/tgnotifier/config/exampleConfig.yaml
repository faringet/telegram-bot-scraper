app_name: tg-notifier
env: dev

logger:
  level: info
  json: true

runtime:
  shutdown_timeout: 15s

storage:
  driver: postgres
  postgres:
    dsn: ""
    max_open_conns: 10
    max_idle_conns: 5
    conn_max_lifetime: 30m
    conn_max_idle_time: 5m

telegram_bot:
  token: ""
  debug: false
  use_webhook: false
  poll_timeout: 30s

notifier:
  # Куда/кому сыпятся сообщения
  supervisor_chat_id: 12345678

  schedule:
    timezone: "Europe/Moscow"
    daily_at: "09:00"
    catch_up_on_start: true

  # Как часто notifier просыпается и проверяет БД
  interval: 30s

  # Сколько записей максимум брать из БД за один проход
  # То есть это размер одной delivery-пачки
  batch_size: 3

  # Минимальная пауза между отправкой двух сообщений в телеге
  min_delay: 500ms

  # До какой длины обрезать длинные тексты в уведомлении
  # Нужна для компактности сообщений и чтобы уведомления были читаемыми
  max_text_runes: 300

  # true -> берем данные, отправляем но НЕ ПОМЕЧАЕМ что они отправленны
  # false -> обычный юзкейс
  dry_run: false