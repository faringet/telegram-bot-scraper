app_name: tg-notifier
env: dev

logger:
  level: info
  json: true

runtime:
  shutdown_timeout: 15s

storage:
  driver: postgres
  postgres:
    dsn: ""
    max_open_conns: 10
    max_idle_conns: 5
    conn_max_lifetime: 30m
    conn_max_idle_time: 5m

telegram_bot:
  token: ""
  debug: false
  use_webhook: false
  poll_timeout: 30s

notifier:
  supervisor_chat_id: 12345678
  interval: 30s
  batch_size: 3
  min_delay: 500ms
  max_text_runes: 300
  dry_run: false